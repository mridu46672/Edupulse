
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .page {
    min-height: 100vh;
    display: flex;
    align-items: stretch;
    font-family: 'DM Sans', sans-serif;
    background: var(--color-background-tertiary);
    padding: 2rem 1rem;
  }

  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 20px;
    max-width: 520px;
    width: 100%;
    margin: auto;
    overflow: hidden;
  }

  .card-header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #1D9E75;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg { width: 24px; height: 24px; }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--color-text-primary);
    letter-spacing: -0.3px;
  }

  .brand-tagline {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-top: 1px;
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .card-body {
    padding: 2rem 2.5rem 2.5rem;
  }

  .section-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 4px;
  }

  .section-sub {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-bottom: 1.75rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--color-text-secondary);
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrap .icon {
    position: absolute;
    left: 11px;
    width: 15px;
    height: 15px;
    color: var(--color-text-secondary);
    opacity: 0.7;
    pointer-events: none;
    flex-shrink: 0;
  }

  input, select {
    width: 100%;
    height: 40px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    padding: 0 12px 0 36px;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: #1D9E75;
    box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
  }

  select { cursor: pointer; padding-right: 30px; }

  .select-arrow {
    position: absolute;
    right: 10px;
    pointer-events: none;
    color: var(--color-text-secondary);
    opacity: 0.7;
  }

  .designation-badge {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .dbadge {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 12px;
    height: 34px;
    border-radius: 30px;
    border: 0.5px solid var(--color-border-secondary);
    font-size: 13px;
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--color-background-primary);
    user-select: none;
  }

  .dbadge:hover { border-color: #1D9E75; color: #0F6E56; }

  .dbadge.active {
    background: #E1F5EE;
    border-color: #1D9E75;
    color: #085041;
    font-weight: 500;
  }

  .dbadge .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    flex-shrink: 0;
  }

  .dbadge.active .dot {
    background: #1D9E75;
    border-color: #1D9E75;
  }

  .divider {
    height: 0.5px;
    background: var(--color-border-tertiary);
    margin: 1.5rem 0;
  }

  .submit-btn {
    width: 100%;
    height: 44px;
    background: #1D9E75;
    color: #fff;
    border: none;
    border-radius: var(--border-radius-md);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: background 0.15s, transform 0.1s;
    margin-top: 1.25rem;
  }

  .submit-btn:hover { background: #0F6E56; }
  .submit-btn:active { transform: scale(0.99); }

  .signin-row {
    text-align: center;
    margin-top: 1rem;
    font-size: 13px;
    color: var(--color-text-secondary);
  }

  .signin-row a {
    color: #1D9E75;
    text-decoration: none;
    font-weight: 500;
  }

  .strength-bar {
    display: flex;
    gap: 4px;
    margin-top: 5px;
  }

  .strength-seg {
    height: 3px;
    flex: 1;
    border-radius: 2px;
    background: var(--color-border-tertiary);
    transition: background 0.2s;
  }

  .strength-label {
    font-size: 11px;
    color: var(--color-text-secondary);
    margin-top: 3px;
  }

  @media (max-width: 480px) {
    .form-grid { grid-template-columns: 1fr; }
    .field.full { grid-column: 1; }
    .card-body { padding: 1.5rem; }
    .card-header { padding: 1.5rem; }
  }
</style>

<div class="page">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">EduPulse sign up form</h2>
  <div class="card">
    <div class="card-header">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L2 8l10 5 10-5-10-5z" fill="white"/>
          <path d="M2 16l10 5 10-5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M2 12l10 5 10-5" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">EduPulse</div>
        <div class="brand-tagline">Smart Campus Platform</div>
      </div>
    </div>

    <div class="card-body">
      <div class="section-title">Create your account</div>
      <div class="section-sub">Join EduPulse to access your campus portal</div>

      <div class="form-grid">

        <div class="field full">
          <label>Full name</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M2.5 13.5c0-3.038 2.462-5 5.5-5s5.5 1.962 5.5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <input type="text" placeholder="e.g. Aryan Hossain" />
          </div>
        </div>

        <div class="field full">
          <label>Email address</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 16 16" fill="none">
              <rect x="2" y="3.5" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M2 5.5l6 4 6-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <input type="email" placeholder="you@university.edu" />
          </div>
        </div>

        <div class="field full">
          <label>Phone number</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 16 16" fill="none">
              <rect x="4.5" y="1.5" width="7" height="13" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
              <circle cx="8" cy="12" r="0.75" fill="currentColor"/>
            </svg>
            <input type="tel" placeholder="+880 1XXX XXXXXX" />
          </div>
        </div>

        <div class="field full">
          <label>Designation</label>
          <div class="designation-badge" id="designationGroup">
            <div class="dbadge active" data-val="student" onclick="selectDesignation(this)">
              <span class="dot"></span> Student
            </div>
            <div class="dbadge" data-val="faculty" onclick="selectDesignation(this)">
              <span class="dot"></span> Faculty
            </div>
            <div class="dbadge" data-val="security" onclick="selectDesignation(this)">
              <span class="dot"></span> Security
            </div>
            <div class="dbadge" data-val="admin" onclick="selectDesignation(this)">
              <span class="dot"></span> Administrator
            </div>
          </div>
        </div>

        <div class="divider" style="grid-column:1/-1; margin: 0.25rem 0;"></div>

        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 16 16" fill="none">
              <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <circle cx="8" cy="10.5" r="1" fill="currentColor"/>
            </svg>
            <input type="password" id="pwdInput" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" />
          </div>
          <div class="strength-bar">
            <div class="strength-seg" id="s1"></div>
            <div class="strength-seg" id="s2"></div>
            <div class="strength-seg" id="s3"></div>
            <div class="strength-seg" id="s4"></div>
          </div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="field">
          <label>Confirm password</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 16 16" fill="none">
              <path d="M3.5 8.5l3 3 6-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input type="password" placeholder="Re-enter password" />
          </div>
        </div>

      </div>

      <button class="submit-btn" onclick="handleSignup()">Create account</button>
      <div class="signin-row">Already have an account? <a href="#">Sign in</a></div>
    </div>
  </div>
</div>

<script>
  function selectDesignation(el) {
    document.querySelectorAll('.dbadge').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  function checkStrength(val) {
    const segs = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
    const label = document.getElementById('strengthLabel');
    segs.forEach(s => { s.style.background = ''; });
    if (!val) { label.textContent = ''; return; }
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['#E24B4A','#EF9F27','#1D9E75','#0F6E56'];
    const labels = ['Weak','Fair','Good','Strong'];
    for (let i = 0; i < score; i++) segs[i].style.background = colors[score-1];
    label.textContent = labels[score-1] || '';
    label.style.color = colors[score-1] || '';
  }

  function handleSignup() {
    alert('Account created! (Demo only)');
  }
</script>
